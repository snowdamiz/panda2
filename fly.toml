app = "panda-assistant"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DATA_DIR = "/data"
  SQLITE_PATH = "/data/panda.db"
  PUBLIC_APP_URL = "https://pandaclanker.xyz"
  BILLING_ALLOWED_ORIGINS = "https://pandaclanker.xyz,https://www.pandaclanker.xyz"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
