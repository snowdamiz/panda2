<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Panda Discord intelligence</title>
  <desc id="desc">A dark editorial social preview card for Panda, an open-source Discord assistant powered through OpenRouter.</desc>
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0v72" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".55"/>
  <circle cx="1020" cy="-110" r="430" fill="none" stroke="#ffffff" stroke-opacity=".11"/>
  <circle cx="1060" cy="-95" r="285" fill="#ffffff" opacity=".05"/>
  <circle cx="56" cy="568" r="280" fill="none" stroke="#ffffff" stroke-opacity=".08"/>
  <rect width="1200" height="630" filter="url(#noise)" opacity=".6"/>

  <g transform="translate(82 78)">
    <rect width="88" height="88" rx="26" fill="#faf9f4"/>
    <circle cx="30" cy="30" r="13" fill="#050505"/>
    <circle cx="58" cy="30" r="13" fill="#050505"/>
    <ellipse cx="44" cy="52" rx="30" ry="27" fill="#f5f5f0"/>
    <ellipse cx="32" cy="49" rx="8" ry="11" fill="#050505" transform="rotate(18 32 49)"/>
    <ellipse cx="56" cy="49" rx="8" ry="11" fill="#050505" transform="rotate(-18 56 49)"/>
    <circle cx="32" cy="47" r="2.8" fill="#f5f5f0"/>
    <circle cx="56" cy="47" r="2.8" fill="#f5f5f0"/>
    <path d="M38 65c4 3 8 3 12 0" fill="none" stroke="#050505" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="198" y="130" fill="#faf9f4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="8">PANDA</text>
  <text x="82" y="304" fill="#faf9f4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="88" font-weight="580" letter-spacing="-5">Your server,</text>
  <text x="82" y="402" fill="#8b8a86" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-style="italic" letter-spacing="-5">with a better brain.</text>
  <text x="84" y="482" fill="#c9c8c1" fill-opacity=".72" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30">Discord-native LLM assistance with model choice,</text>
  <text x="84" y="524" fill="#c9c8c1" fill-opacity=".72" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30">governed tools, private memory, and operational control.</text>

  <g transform="translate(832 220)">
    <rect width="280" height="178" rx="24" fill="#101010" stroke="#ffffff" stroke-opacity=".16"/>
    <rect x="18" y="22" width="54" height="14" rx="7" fill="#faf9f4" fill-opacity=".24"/>
    <rect x="88" y="22" width="128" height="14" rx="7" fill="#faf9f4" fill-opacity=".14"/>
    <circle cx="44" cy="82" r="19" fill="#cfcfc8"/>
    <rect x="78" y="66" width="156" height="10" rx="5" fill="#faf9f4" fill-opacity=".18"/>
    <rect x="78" y="88" width="120" height="10" rx="5" fill="#faf9f4" fill-opacity=".12"/>
    <circle cx="44" cy="132" r="19" fill="#f2f1eb"/>
    <rect x="78" y="116" width="134" height="10" rx="5" fill="#faf9f4" fill-opacity=".22"/>
    <rect x="78" y="138" width="174" height="10" rx="5" fill="#faf9f4" fill-opacity=".13"/>
  </g>
</svg>
