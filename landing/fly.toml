app = "panda2-landing"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    PUBLIC_SITE_URL = "https://panda2-landing.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"
