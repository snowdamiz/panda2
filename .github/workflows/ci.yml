name: CI

on:
  push:
    branches:
      - release

permissions:
  contents: read

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ matrix.app.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: panda-assistant
            directory: .
          - name: panda2-landing
            directory: landing
    defaults:
      run:
        working-directory: ${{ matrix.app.directory }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app "${{ matrix.app.name }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
